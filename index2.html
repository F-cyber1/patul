<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Symphonia-XI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style2.css">
</head>
<body>

<!-- AUDIO -->
<audio id="music">
  <source src="symphonia-xi.mp3" type="audio/mp3">
</audio>

<!-- VIDEO -->
<div class="video-box">
  <video id="video" controls>
    <source src="symphonia-xi.mp4" type="video/mp4">
  </video>
  <p>Symphonia XI 🎵</p>
</div>

<!-- CENTER WRAPPER (FIX CENTER) -->
<div class="center-wrapper">

  <div class="card" id="card">
    <div class="inner">

      <div class="front">
        <img src="jihan.jpeg">
        <p>Tap / Geser Queen</p>
      </div>

      <div class="back">
        <h2>Haloo Jihan</h2>
        <p>Senang bisa mengenal mu, meskipun hanya sebatas teman. Sehat selalu ya Jihan, jangan lupa cuci piring</p>
      </div>

    </div>
  </div>

</div>

<!-- MUSIC BAR -->
<div class="music-bar">
  <div class="bar">
    <div class="fill" id="fill"></div>
  </div>
  <span id="time">0:00</span>
</div>

<!-- ENDING -->
<div id="ending">
  <h1>🎵 Lagu Selesai</h1>
  <p>Terima kasih sudah mendengarkan Queen</p>
</div>

<script src="script2.js"></script>
</body>
</html>
